<!DOCTYPE html>
<html lang="ca">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Dashboard Agrupacions</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.sheetjs.com/xlsx-latest/package/dist/xlsx.full.min.js"></script>
    <style>
        body, html { height: 100vh; overflow: hidden; }
        .app-container { height: 100vh; display: flex; flex-direction: column; }
        .main-content { flex: 1; display: grid; grid-template-columns: 320px 1fr; overflow: hidden; }
        .scrollable { overflow-y: auto; scrollbar-width: thin; }
        .group-container { min-height: 120px; transition: all 0.2s; }
        .drop-target { border: 2px dashed #4f46e5 !important; background: #f5f7ff; }
        .warning-card { border: 2px solid #ef4444 !important; background: #fef2f2 !important; animation: pulse 1.5s infinite; }
        @keyframes pulse { 0% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.4); } 70% { box-shadow: 0 0 0 10px rgba(239, 68, 68, 0); } 100% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0); } }
    </style>
</head>
<body class="bg-slate-100 text-slate-800">

<div class="app-container">
    <header class="bg-white border-b border-slate-200 px-6 py-3 flex justify-between items-center shadow-sm z-10">
        <div>
            <h1 class="text-xl font-black text-indigo-600">Agrupacions <span class="text-slate-400 font-light">| Dashboard</span></h1>
        </div>
        <div class="flex gap-2">
            <button id="undoBtn" onclick="undo()" disabled class="px-3 py-1.5 rounded-lg bg-slate-100 text-slate-500 font-bold text-xs disabled:opacity-30">Desfer</button>
            <button onclick="downloadTemplate()" class="px-3 py-1.5 rounded-lg bg-indigo-50 text-indigo-700 font-bold text-xs border border-indigo-100">Plantilla</button>
            <button onclick="resetAll()" class="px-3 py-1.5 rounded-lg bg-red-50 text-red-600 font-bold text-xs border border-red-100">Reiniciar</button>
        </div>
    </header>

    <div class="main-content">
        <aside class="bg-white border-r border-slate-200 flex flex-col p-4 space-y-4 scrollable">
            <div id="dropZone" class="border-2 border-dashed border-slate-200 rounded-xl p-4 text-center hover:border-indigo-400 cursor-pointer bg-slate-50 transition-colors relative">
                <input type="file" id="fileInput" accept=".csv, .xlsx" class="absolute inset-0 opacity-0 cursor-pointer">
                <p class="text-xs font-bold text-slate-500">Arrossega o penja fitxer (XLSX/CSV)</p>
            </div>

            <div class="bg-slate-900 rounded-xl p-4 text-white space-y-3">
                <div class="flex gap-2">
                    <div class="flex-1">
                        <label class="text-[10px] font-bold text-slate-400 uppercase">Mida Ideal</label>
                        <input type="number" id="idealSize" value="4" class="w-full bg-slate-800 border-none rounded-lg p-2 text-sm">
                    </div>
                    <div class="flex-1">
                        <label class="text-[10px] font-bold text-slate-400 uppercase">Mida Max</label>
                        <input type="number" id="maxSize" value="5" class="w-full bg-slate-800 border-none rounded-lg p-2 text-sm">
                    </div>
                </div>
                <button onclick="generateGroups()" class="w-full bg-indigo-500 hover:bg-indigo-600 text-white font-bold py-2 rounded-lg text-sm transition-all">Generar Nous Grups</button>
                <button id="exportBtn" onclick="exportResults()" class="hidden w-full bg-emerald-600 hover:bg-emerald-700 text-white font-bold py-2 rounded-lg text-sm transition-all">Exportar Resultats</button>
            </div>

            <div class="border-t border-slate-100 pt-4 space-y-2">
                <h3 class="text-[10px] font-black text-slate-400 uppercase">Afegir Alumne</h3>
                <input type="text" id="m_id" placeholder="Nom alumne..." class="w-full border border-slate-200 rounded-lg p-2 text-sm">
                <div class="flex gap-2">
                    <select id="m_part" class="flex-1 border border-slate-200 rounded-lg p-1.5 text-xs"><option>Alt</option><option selected>Mitjà</option><option>Baix</option></select>
                    <select id="m_comp" class="flex-1 border border-slate-200 rounded-lg p-1.5 text-xs"><option>Altes</option><option selected>Mitjanes</option><option>Baixes</option></select>
                </div>
                <label class="flex items-center gap-2 text-xs font-bold text-slate-600">
                    <input type="checkbox" id="m_abs"> Absentista
                </label>
                <button onclick="addManualStudent()" class="w-full bg-slate-100 hover:bg-slate-200 font-bold py-2 rounded-lg text-xs">Afegir a la llista</button>
            </div>

            <div id="counter" class="text-[10px] font-bold text-slate-400 text-center uppercase mt-auto">0 Alumnes</div>
        </aside>

        <main class="p-6 scrollable bg-slate-100">
            <div id="groupsGrid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4">
                </div>
        </main>
    </div>
</div>

<script>
    let students = [];
    let currentGroups = [];
    let history = [];

    const valMap = { "Alt": 3, "Altes": 3, "Mitjà": 2, "Mitjanes": 2, "Baix": 1, "Baixes": 1, "Si": true, "No": false, "SÍ": true };

    // --- IMPORTACIÓ ---
    document.getElementById('fileInput').addEventListener('change', e => {
        const file = e.target.files[0];
        const reader = new FileReader();
        reader.onload = (evt) => {
            const wb = XLSX.read(evt.target.result, { type: 'array' });
            const data = XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]]);
            processImport(data);
        };
        reader.readAsArrayBuffer(file);
    });

    function processImport(data) {
        students = [];
        let initialGrouping = {};

        data.forEach(row => {
            const s = {
                id: row.Codi_Alumne || row['codi alumne'] || "N/A",
                participation: valMap[row.Participacio] || 2,
                competence: valMap[row.Competencies] || 2,
                incompatible: row.Incompatible ? String(row.Incompatible).split(/[,;]/).map(x => x.trim()) : [],
                absentee: valMap[row.Absentista] === true,
                preferences: row.Preferencies ? String(row.Preferencies).split(/[,;]/).map(x => x.trim()) : []
            };
            students.push(s);

            // Reconeixement de grup preexistent
            let gName = row.Grup || row.Equip;
            if (gName) {
                if (!initialGrouping[gName]) initialGrouping[gName] = [];
                initialGrouping[gName].push(s);
            }
        });

        if (Object.keys(initialGrouping).length > 0) {
            currentGroups = Object.values(initialGrouping);
            renderGroups();
        } else {
            generateGroups();
        }
        updateStats();
    }

    // --- LÒGICA DE GRUPS (ESTRICTA 4-5) ---
    function generateGroups() {
        if (students.length === 0) return;
        const ideal = parseInt(document.getElementById('idealSize').value);
        const max = parseInt(document.getElementById('maxSize').value);

        // Algoritme de repartiment exacte (greedy per complir mides)
        let numGroups = Math.floor(students.length / ideal);
        let groups = Array.from({length: numGroups}, () => []);
        
        // Shuffle
        let pool = [...students].sort(() => Math.random() - 0.5);
        
        // Prioritat: Incompatibilitats i Absentistes
        pool.sort((a,b) => (b.absentee ? 1 : 0) - (a.absentee ? 1 : 0));

        pool.forEach(student => {
            let bestG = -1;
            let minConflict = Infinity;

            for(let i=0; i<groups.length; i++) {
                if(groups[i].length >= max) continue;
                
                let conflictScore = groups[i].filter(m => 
                    student.incompatible.includes(m.id) || m.incompatible.includes(student.id)
                ).length * 100;

                conflictScore += groups[i].filter(m => m.absentee).length * 10;
                
                if(conflictScore < minConflict) {
                    minConflict = conflictScore;
                    bestG = i;
                }
            }

            if(bestG === -1) { // Si tots estan al max, forçar el més buit
                bestG = groups.indexOf(groups.reduce((a,b) => a.length < b.length ? a : b));
            }
            groups[bestG].push(student);
        });

        currentGroups = groups.filter(g => g.length > 0);
        saveHistory();
        renderGroups();
    }

    function renderGroups() {
        const grid = document.getElementById('groupsGrid');
        grid.innerHTML = '';
        document.getElementById('exportBtn').classList.remove('hidden');

        currentGroups.forEach((group, idx) => {
            const div = document.createElement('div');
            div.className = `group-container bg-white rounded-xl shadow-sm border border-slate-200 p-3 scrollable`;
            div.innerHTML = `<h4 class="text-[10px] font-black text-slate-400 mb-2 uppercase">Grup ${idx+1} (${group.length})</h4>`;
            
            div.ondragover = e => { e.preventDefault(); div.classList.add('drop-target'); };
            div.ondragleave = () => div.classList.remove('drop-target');
            div.ondrop = e => handleDrop(e, idx);

            group.forEach(s => {
                const hasConflict = group.some(m => s.incompatible.includes(m.id) || m.incompatible.includes(s.id));
                const card = document.createElement('div');
                card.draggable = true;
                card.className = `p-2 mb-2 rounded-lg text-xs font-bold border ${hasConflict ? 'warning-card' : 'bg-slate-50 border-slate-100'} cursor-grab active:cursor-grabbing`;
                card.innerHTML = `
                    <div class="flex justify-between items-center">
                        <span>${s.id}</span>
                        ${s.absentee ? '<span class="bg-red-500 text-white text-[8px] px-1 rounded">ABS</span>' : ''}
                    </div>
                `;
                card.ondragstart = e => {
                    e.dataTransfer.setData('sId', s.id);
                    e.dataTransfer.setData('fromG', idx);
                };
                div.appendChild(card);
            });
            grid.appendChild(div);
        });
    }

    function handleDrop(e, toG) {
        e.preventDefault();
        const sId = e.dataTransfer.getData('sId');
        const fromG = parseInt(e.dataTransfer.getData('fromG'));
        if(fromG === toG) return;

        const sIdx = currentGroups[fromG].findIndex(x => x.id === sId);
        const [student] = currentGroups[fromG].splice(sIdx, 1);
        currentGroups[toG].push(student);
        
        saveHistory();
        renderGroups();
    }

    // --- UTILITATS ---
    function saveHistory() {
        history.push(JSON.stringify(currentGroups));
        document.getElementById('undoBtn').disabled = history.length <= 1;
    }

    function undo() {
        if(history.length <= 1) return;
        history.pop();
        currentGroups = JSON.parse(history[history.length-1]);
        renderGroups();
    }

    function updateStats() {
        document.getElementById('counter').innerText = `${students.length} Alumnes`;
    }

    function resetAll() {
        students = []; currentGroups = []; history = [];
        document.getElementById('groupsGrid').innerHTML = '';
        document.getElementById('exportBtn').classList.add('hidden');
        updateStats();
    }

    function addManualStudent() {
        const id = document.getElementById('m_id').value;
        if(!id) return;
        students.push({
            id,
            participation: valMap[document.getElementById('m_part').value],
            competence: valMap[document.getElementById('m_comp').value],
            incompatible: [], absentee: document.getElementById('m_abs').checked, preferences: []
        });
        document.getElementById('m_id').value = '';
        updateStats();
        generateGroups();
    }

    function downloadTemplate() {
        const ws = XLSX.utils.aoa_to_sheet([
            ["Codi_Alumne", "Participacio", "Competencies", "Incompatible", "Absentista", "Preferencies", "Grup"],
            ["Alumne 1", "Alt", "Altes", "Alumne 2", "No", "", "Grup 1"]
        ]);
        const wb = XLSX.utils.book_new();
        XLSX.utils.book_append_sheet(wb, ws, "Plantilla");
        XLSX.writeFile(wb, "Plantilla_Agrupacions.xlsx");
    }

    function exportResults() {
        const out = [];
        currentGroups.forEach((g, i) => {
            g.forEach(s => {
                out.push({
                    Codi_Alumne: s.id,
                    Participacio: Object.keys(valMap).find(k => valMap[k] === s.participation),
                    Competencies: Object.keys(valMap).find(k => valMap[k] === s.competence),
                    Incompatible: s.incompatible.join(","),
                    Absentista: s.absentee ? "Si" : "No",
                    Preferencies: s.preferences.join(","),
                    Grup: `Grup ${i+1}`
                });
            });
        });
        const ws = XLSX.utils.json_to_sheet(out);
        const wb = XLSX.utils.book_new();
        XLSX.utils.book_append_sheet(wb, ws, "Resultats");
        XLSX.writeFile(wb, "Resultats_Agrupacions.xlsx");
    }
</script>
</body>
</html>
