<!DOCTYPE html>
<html lang="ca">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Generador de Grups de Classe</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.sheetjs.com/xlsx-latest/package/dist/xlsx.full.min.js"></script>
    <style>
        .dragging { opacity: 0.5; transform: scale(0.95); }
        .drop-target { border: 2px dashed #6366f1 !important; background-color: #f5f3ff !important; }
        
        @media (min-width: 1024px) {
            body { overflow: hidden; height: 100vh; }
            #app { height: 100vh; display: flex; flex-direction: column; }
            .dashboard-container { flex: 1; overflow: hidden; }
            .scrollable-panel { overflow-y: auto; height: 100%; padding-bottom: 2rem; }
        }

        .scrollable-panel::-webkit-scrollbar { width: 6px; }
        .scrollable-panel::-webkit-scrollbar-thumb { background: #e2e8f0; border-radius: 10px; }

        .modal-active { opacity: 1 !important; pointer-events: auto !important; }
        .modal-content-active { transform: scale(1) !important; }

        .student-card { transition: all 0.2s ease; cursor: grab; }
        .student-card:active { cursor: grabbing; }
        .incompatible-alert { animation: pulse-red 2s infinite; }
        
        @keyframes pulse-red {
            0%, 100% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.4); }
            50% { box-shadow: 0 0 0 8px rgba(239, 68, 68, 0); }
        }
    </style>
</head>
<body class="bg-slate-50 text-slate-800 font-sans">

<div id="app" class="max-w-[1600px] mx-auto w-full px-4 md:px-6">
    <header class="py-4 flex flex-col md:flex-row justify-between items-center border-b border-slate-200 mb-4 bg-slate-50 sticky top-0 z-10">
        <div class="text-center md:text-left">
            <h1 class="text-2xl font-bold text-indigo-700">Agrupacions de Classe</h1>
            <p class="text-xs text-slate-500 font-medium uppercase tracking-wider">Gestió d'Equips i Incompatibilitats</p>
        </div>
        <div class="flex items-center gap-3 mt-4 md:mt-0">
            <button id="undoBtn" onclick="undo()" disabled class="disabled:opacity-30 disabled:cursor-not-allowed text-[11px] font-bold text-slate-600 hover:bg-slate-100 border border-slate-200 px-3 py-1.5 rounded-lg transition-colors flex items-center gap-1">
                <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 10h10a8 8 0 018 8v2M3 10l6 6m-6-6l6-6"></path></svg>
                Desfer
            </button>
            <button onclick="downloadTemplate()" class="text-[11px] font-bold text-indigo-600 hover:bg-indigo-50 border border-indigo-200 px-3 py-1.5 rounded-lg transition-colors flex items-center gap-1">
                <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"></path></svg>
                Plantilla
            </button>
            <button onclick="showResetConfirm()" class="text-[11px] font-bold text-amber-600 hover:bg-amber-50 border border-amber-200 px-3 py-1.5 rounded-lg transition-colors flex items-center gap-1">
                <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"></path></svg>
                Reiniciar
            </button>
        </div>
    </header>

    <div class="dashboard-container grid grid-cols-1 lg:grid-cols-12 gap-6 h-full pb-6">
        <!-- Barra Lateral -->
        <div class="lg:col-span-3 scrollable-panel space-y-5">
            <section class="bg-white p-5 rounded-2xl shadow-sm border border-slate-200">
                <h2 class="text-sm font-bold text-slate-400 uppercase tracking-widest mb-4 flex items-center gap-2">
                    <span class="w-5 h-5 bg-indigo-600 text-white rounded-full flex items-center justify-center text-[10px]">1</span>
                    Dades Alumnat
                </h2>
                <div id="dropZone" class="border-2 border-dashed border-slate-200 rounded-xl p-6 text-center hover:border-indigo-400 transition-colors cursor-pointer relative group">
                    <input type="file" id="fileInput" accept=".csv, .xlsx, .xls" class="absolute inset-0 opacity-0 cursor-pointer">
                    <div class="text-indigo-500 group-hover:scale-110 transition-transform mb-2 flex justify-center">
                        <svg class="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 13h6m-3-3v6m5 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"></path></svg>
                    </div>
                    <p class="text-xs font-bold text-slate-700">Puja fitxer d'alumnes</p>
                </div>
            </section>

            <section class="bg-indigo-700 p-5 rounded-2xl shadow-lg text-white">
                <h2 class="text-sm font-bold text-indigo-200 uppercase tracking-widest mb-4 flex items-center gap-2">
                    <span class="w-5 h-5 bg-white text-indigo-700 rounded-full flex items-center justify-center text-[10px]">2</span>
                    Configuració
                </h2>
                <div class="space-y-4">
                    <div class="grid grid-cols-2 gap-3">
                        <div>
                            <label class="block text-[10px] font-bold text-indigo-200 mb-1 uppercase">Mida Ideal</label>
                            <input type="number" id="preferredSize" value="3" min="1" class="w-full px-3 py-2 bg-indigo-800 border border-indigo-500 rounded-lg outline-none text-sm font-bold">
                        </div>
                        <div>
                            <label class="block text-[10px] font-bold text-indigo-200 mb-1 uppercase">Mida Màx.</label>
                            <input type="number" id="maxSize" value="4" min="1" class="w-full px-3 py-2 bg-indigo-800 border border-indigo-500 rounded-lg outline-none text-sm font-bold">
                        </div>
                    </div>
                    <button onclick="generateGroups()" class="w-full bg-white hover:bg-indigo-50 text-indigo-700 font-bold py-3 rounded-xl transition-all shadow-md active:scale-95">
                        Sortit i Agrupar
                    </button>
                    <button id="exportBtn" onclick="exportToCSV()" class="hidden w-full bg-emerald-500 hover:bg-emerald-600 text-white font-bold py-3 rounded-xl transition-all shadow-md">
                        Exportar Resultats
                    </button>
                </div>
            </section>
        </div>

        <!-- Zona Principal -->
        <div class="lg:col-span-9 scrollable-panel">
            <div id="emptyState" class="h-full flex flex-col items-center justify-center bg-white rounded-3xl border-2 border-dashed border-slate-200 p-10 text-center">
                <div class="w-20 h-20 bg-slate-50 rounded-full flex items-center justify-center mb-4 text-slate-300">
                    <svg class="w-10 h-10" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.656-.126-1.283-.356-1.857M7 20H2v-2a3 3 0 005.356-1.857M7 20v-2c0-.656.126-1.283.356-1.857m0 0a5.002 5.002 0 019.288 0M15 7a3 3 0 11-6 0 3 3 0 016 0zm6 3a2 2 0 11-4 0 2 2 0 014 0zM7 10a2 2 0 11-4 0 2 2 0 014 0z"></path></svg>
                </div>
                <h3 class="text-xl font-bold text-slate-400">Pujar dades per començar</h3>
                <p id="counterLabel" class="text-xs text-indigo-500 mt-4 font-bold"></p>
            </div>

            <div id="resultsArea" class="hidden">
                <div class="flex justify-between items-center mb-6">
                    <h2 class="text-2xl font-black text-slate-800">Panell de Treball</h2>
                    <span id="statsLabel" class="text-[11px] font-bold bg-white border border-slate-200 px-4 py-1.5 rounded-full text-slate-500 shadow-sm"></span>
                </div>
                <div id="groupsGrid" class="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-3 gap-5"></div>
            </div>
        </div>
    </div>
</div>

<!-- Modal Reset -->
<div id="customModal" class="fixed inset-0 bg-slate-900/40 backdrop-blur-sm z-50 flex items-center justify-center opacity-0 pointer-events-none transition-all duration-300">
    <div class="bg-white rounded-3xl p-8 max-w-sm w-full shadow-2xl transform scale-95 transition-all duration-300">
        <h3 class="text-xl font-bold text-slate-800 text-center mb-2">Reiniciar dades?</h3>
        <p class="text-slate-500 text-center text-sm mb-8">Es borraran tots els alumnes i grups actuals.</p>
        <div class="flex gap-3">
            <button onclick="closeModal()" class="flex-1 px-4 py-3 rounded-xl border border-slate-200 text-slate-500 font-bold text-sm">Enrere</button>
            <button id="confirmResetBtn" class="flex-1 px-4 py-3 rounded-xl bg-amber-500 text-white font-bold text-sm">Borrar Tot</button>
        </div>
    </div>
</div>

<script>
    let students = [];
    let currentGroups = [];
    let history = []; 
    const MAX_HISTORY = 20;

    const mapping = { "Alt": 3, "Altes": 3, "Mitjà": 2, "Mitjanes": 2, "Baix": 1, "Baixes": 1, "Si": true, "No": false, "SÍ": true, "SI": true };
    const revMapping = {
        participation: { 3: "Alt", 2: "Mitjà", 1: "Baix" },
        competence: { 3: "Altes", 2: "Mitjanes", 1: "Baixes" }
    };

    // --- HISTORIAL ---
    function saveToHistory() {
        const state = JSON.stringify(currentGroups);
        if (history.length > 0 && history[history.length - 1] === state) return;
        history.push(state);
        if (history.length > MAX_HISTORY + 1) history.shift();
        updateUndoButton();
    }

    function undo() {
        if (history.length <= 1) return;
        history.pop();
        currentGroups = JSON.parse(history[history.length - 1]);
        renderGroups();
        updateUndoButton();
    }

    function updateUndoButton() {
        document.getElementById('undoBtn').disabled = history.length <= 1;
    }

    // --- GESTIÓ DE FITXERS ---
    const fileInput = document.getElementById('fileInput');
    fileInput.addEventListener('change', (e) => {
        const file = e.target.files[0];
        if (file) handleFile(file);
    });

    function handleFile(file) {
        const reader = new FileReader();
        const extension = file.name.split('.').pop().toLowerCase();
        reader.onload = function(e) {
            if (extension === 'csv') processCSV(e.target.result);
            else processExcel(e.target.result);
        };
        if (extension === 'csv') reader.readAsText(file);
        else reader.readAsArrayBuffer(file);
    }

    function processExcel(buffer) {
        const workbook = XLSX.read(buffer, { type: 'array' });
        const sheetName = workbook.SheetNames[0];
        const csv = XLSX.utils.sheet_to_csv(workbook.Sheets[sheetName]);
        processCSV(csv);
    }

    function processCSV(text) {
        students = [];
        const lines = text.split(/\r?\n/);
        for (let i = 1; i < lines.length; i++) {
            let line = lines[i].trim();
            if (!line) continue;
            const separator = line.includes(';') ? ';' : ',';
            const cols = line.match(/(".*?"|[^,;]+|(?<=[,;])(?=[,;])|(?<=[,;])$)/g) || [];
            const cleanCols = cols.map(c => c.trim().replace(/^"|$/g, ''));
            if (cleanCols[0]) {
                students.push(createStudentObject(cleanCols[0], cleanCols[1], cleanCols[2], cleanCols[3], cleanCols[4], cleanCols[5]));
            }
        }
        updateInterface();
        generateGroups();
    }

    function createStudentObject(id, part, comp, incomp, abs, pref) {
        return {
            id: id,
            participation: mapping[part] || 2,
            competence: mapping[comp] || 2,
            incompatible: incomp ? String(incomp).split(/[-|/]/).map(x => x.trim()) : [],
            absentee: mapping[abs] || false,
            preferences: pref ? String(pref).split(/[-|/]/).map(x => x.trim()) : []
        };
    }

    function updateInterface() {
        document.getElementById('counterLabel').innerText = students.length > 0 ? `${students.length} alumnes carregats` : "";
    }

    // --- ALGORITME D'AGRUPAMENT ---
    function generateGroups() {
        if (students.length === 0) return;
        
        const ideal = parseInt(document.getElementById('preferredSize').value);
        const max = parseInt(document.getElementById('maxSize').value);
        const totalAlumnes = students.length;

        let numGroups = Math.floor(totalAlumnes / ideal);
        let residu = totalAlumnes % ideal;
        if (residu > 0 && residu > (numGroups * (max - ideal))) numGroups++;
        if (numGroups === 0) numGroups = 1;

        const basePerGrup = Math.floor(totalAlumnes / numGroups);
        const extraAlumnes = totalAlumnes % numGroups;
        let targetSizes = Array(numGroups).fill(basePerGrup);
        for(let i=0; i<extraAlumnes; i++) targetSizes[i]++;

        let groups = Array.from({ length: numGroups }, () => []);
        const globalAvgComp = students.reduce((acc, s) => acc + s.competence, 0) / students.length;
        const globalAvgPart = students.reduce((acc, s) => acc + s.participation, 0) / students.length;

        // Ordenem per dificultat (absentisme i incompatibilitats primer)
        let sorted = [...students]
            .map(value => ({ value, sort: Math.random() }))
            .sort((a, b) => a.sort - b.sort) // Atzar inicial
            .map(({ value }) => value)
            .sort((a, b) => {
                const bRest = b.incompatible.length + (b.absentee ? 10 : 0);
                const aRest = a.incompatible.length + (a.absentee ? 10 : 0);
                return bRest - aRest;
            });

        sorted.forEach(student => {
            let scores = groups.map((g, i) => {
                if (g.length >= targetSizes[i]) return { index: i, score: -100000000 };
                
                let score = Math.random() * 5; // Molt poc atzar per desempatar
                
                // CONTROL RIGID D'INCOMPATIBILITATS
                const checkId = student.id.toLowerCase().trim();
                const hasIncompatible = g.some(m => {
                    const mId = m.id.toLowerCase().trim();
                    const studentList = student.incompatible.map(x => x.toLowerCase().trim());
                    const memberList = m.incompatible.map(x => x.toLowerCase().trim());
                    return studentList.includes(mId) || memberList.includes(checkId);
                });
                
                if (hasIncompatible) score -= 5000000; // Penalització massiva

                // Balanç de nivells
                if (g.length > 0) {
                    const currentAvgComp = g.reduce((acc, m) => acc + m.competence, 0) / g.length;
                    const newAvgComp = (g.reduce((acc, m) => acc + m.competence, 0) + student.competence) / (g.length + 1);
                    score -= Math.abs(newAvgComp - globalAvgComp) * 1000;
                }

                if (student.absentee) {
                    score -= (g.filter(m => m.absentee).length * 10000); 
                }

                // Preferències
                if (g.some(m => {
                    const mId = m.id.toLowerCase().trim();
                    const studentPrefs = student.preferences.map(x => x.toLowerCase().trim());
                    return studentPrefs.includes(mId);
                })) score += 500;

                return { index: i, score: score };
            });

            scores.sort((a, b) => b.score - a.score);
            groups[scores[0].index].push(student);
        });

        currentGroups = groups;
        saveToHistory();
        renderGroups();
    }

    // --- RENDERITZACIÓ I DRAG & DROP ---
    function renderGroups() {
        document.getElementById('emptyState').classList.add('hidden');
        document.getElementById('resultsArea').classList.remove('hidden');
        document.getElementById('exportBtn').classList.remove('hidden');
        const grid = document.getElementById('groupsGrid');
        grid.innerHTML = '';
        
        currentGroups.forEach((group, gIndex) => {
            const container = document.createElement('div');
            container.className = 'bg-white border border-slate-200 rounded-3xl overflow-hidden shadow-sm transition-all flex flex-col group';
            
            // Events de zona per deixar anar
            container.addEventListener('dragover', e => { 
                e.preventDefault(); 
                container.classList.add('drop-target'); 
            });
            container.addEventListener('dragleave', () => container.classList.remove('drop-target'));
            container.addEventListener('drop', e => {
                e.preventDefault();
                container.classList.remove('drop-target');
                const studentId = e.dataTransfer.getData('text/plain');
                const fromIdx = parseInt(e.dataTransfer.getData('fromGroup'));
                moveStudent(studentId, fromIdx, gIndex);
            });

            let html = `
                <div class="bg-indigo-50/50 px-5 py-3 border-b border-indigo-100 flex justify-between items-center">
                    <span class="font-black text-indigo-700 uppercase text-[10px]">Grup ${gIndex + 1}</span>
                    <span class="text-[10px] bg-white text-indigo-400 px-2 py-0.5 rounded-full font-bold">${group.length} Alumnes</span>
                </div>
                <div class="p-4 space-y-2 flex-1 min-h-[100px]">`;
            
            group.forEach(student => {
                const checkId = student.id.toLowerCase().trim();
                const hasIncompatible = group.some(other => {
                    if (other.id === student.id) return false;
                    const otherId = other.id.toLowerCase().trim();
                    const studentIncomp = student.incompatible.map(x => x.toLowerCase().trim());
                    const otherIncomp = other.incompatible.map(x => x.toLowerCase().trim());
                    return studentIncomp.includes(otherId) || otherIncomp.includes(checkId);
                });

                html += `
                    <div draggable="true" 
                         ondragstart="handleDragStart(event, '${student.id}', ${gIndex})" 
                         ondragend="handleDragEnd(event)"
                         class="student-card px-4 py-3 rounded-2xl border transition-all flex justify-between items-center text-xs font-bold ${hasIncompatible ? 'incompatible-alert border-red-200 bg-red-50 text-red-900 ring-2 ring-red-500/20' : 'border-slate-100 bg-slate-50 hover:border-indigo-200 hover:bg-white'}">
                        <div class="flex flex-col">
                            <span class="text-slate-700">${student.id}</span>
                            <div class="flex gap-2 mt-1">
                                <span class="text-[9px] px-1 bg-indigo-100 text-indigo-600 rounded">C:${student.competence}</span>
                                <span class="text-[9px] px-1 bg-amber-100 text-amber-600 rounded">P:${student.participation}</span>
                                ${student.absentee ? '<span class="text-[9px] px-1 bg-red-100 text-red-600 rounded">ABS</span>' : ''}
                            </div>
                        </div>
                        ${hasIncompatible ? '<span title="Incompatibilitat detectada en aquest grup" class="text-base">⚠️</span>' : ''}
                    </div>`;
            });
            container.innerHTML = html + `</div>`;
            grid.appendChild(container);
        });
        document.getElementById('statsLabel').innerText = `${currentGroups.length} Equips • Mida ideal: ${document.getElementById('preferredSize').value}`;
    }

    function handleDragStart(e, id, fromIdx) {
        e.dataTransfer.setData('text/plain', id);
        e.dataTransfer.setData('fromGroup', fromIdx);
        e.target.classList.add('dragging');
    }

    function handleDragEnd(e) {
        e.target.classList.remove('dragging');
    }

    function moveStudent(id, from, to) {
        if (from === to) return;
        const sIdx = currentGroups[from].findIndex(s => s.id === id);
        if (sIdx > -1) {
            const [student] = currentGroups[from].splice(sIdx, 1);
            currentGroups[to].push(student);
            saveToHistory();
            renderGroups();
        }
    }

    // --- UTILITATS ---
    function showResetConfirm() { document.getElementById('customModal').classList.add('modal-active'); }
    function closeModal() { document.getElementById('customModal').classList.remove('modal-active'); }
    document.getElementById('confirmResetBtn').onclick = () => {
        students = []; currentGroups = []; history = [];
        document.getElementById('resultsArea').classList.add('hidden');
        document.getElementById('emptyState').classList.remove('hidden');
        document.getElementById('exportBtn').classList.add('hidden');
        updateInterface(); updateUndoButton(); closeModal();
    };

    function downloadTemplate() {
        const csv = "Codi_Alumne,Participacio,Competencies,Incompatible,Absentista,Preferencies\nAlumne 1,Alt,Altes,Alumne 2,No,Alumne 3\nAlumne 2,Mitjà,Mitjanes,Alumne 1,No,\nAlumne 3,Baix,Baixes,,Si,Alumne 1";
        const blob = new Blob([csv], { type: 'text/csv' });
        const a = document.createElement("a");
        a.href = URL.createObjectURL(blob);
        a.download = "plantilla_alumnes.csv";
        a.click();
    }

    function exportToCSV() {
        let csv = "Codi_Alumne,Grup,Participacio,Competencies,Incompatible,Absentista,Preferencies\n";
        currentGroups.forEach((group, groupIdx) => {
            group.forEach(s => {
                const p = revMapping.participation[s.participation] || "";
                const c = revMapping.competence[s.competence] || "";
                csv += `"${s.id}","${groupIdx + 1}","${p}","${c}","${s.incompatible.join("-")}","${s.absentee ? "Si" : "No"}","${s.preferences.join("-")}"\n`;
            });
        });
        const blob = new Blob([csv], { type: 'text/csv;charset=utf-8' });
        const a = document.createElement("a");
        a.href = URL.createObjectURL(blob);
        a.download = "resultats_agrupacions.csv";
        a.click();
    }
</script>
</body>
</html>
