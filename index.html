<!DOCTYPE html>
<html lang="ca">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Dashboard Agrupacions</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.sheetjs.com/xlsx-latest/package/dist/xlsx.full.min.js"></script>
    <style>
        body, html { height: 100vh; overflow: hidden; margin: 0; padding: 0; }
        .app-container { height: 100vh; display: flex; flex-direction: column; }
        .main-content { flex: 1; display: grid; grid-template-columns: 320px 1fr; overflow: hidden; }
        .scrollable { overflow-y: auto; scrollbar-width: thin; }
        .group-container { min-height: 150px; transition: all 0.2s; border: 2px solid transparent; }
        .drop-target { border: 2px dashed #4f46e5 !important; background: #f5f7ff; }
        .warning-card { border: 2px solid #ef4444 !important; background: #fef2f2 !important; animation: pulse 1.5s infinite; }
        @keyframes pulse { 0% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.4); } 70% { box-shadow: 0 0 0 10px rgba(239, 68, 68, 0); } 100% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0); } }
    </style>
</head>
<body class="bg-slate-100 text-slate-800">

<div class="app-container">
    <!-- Header -->
    <header class="bg-white border-b border-slate-200 px-6 py-3 flex justify-between items-center shadow-sm z-10">
        <div>
            <h1 class="text-xl font-black text-indigo-600">Agrupacions <span class="text-slate-400 font-light">| Dashboard</span></h1>
        </div>
        <div class="flex gap-2">
            <button id="undoBtn" onclick="undo()" disabled class="px-3 py-1.5 rounded-lg bg-slate-100 text-slate-500 font-bold text-xs disabled:opacity-30">Desfer</button>
            <button onclick="downloadTemplate()" class="px-3 py-1.5 rounded-lg bg-indigo-50 text-indigo-700 font-bold text-xs border border-indigo-100">Plantilla</button>
            <button onclick="resetAll()" class="px-3 py-1.5 rounded-lg bg-red-50 text-red-600 font-bold text-xs border border-red-100">Reiniciar</button>
        </div>
    </header>

    <div class="main-content">
        <!-- Sidebar -->
        <aside class="bg-white border-r border-slate-200 flex flex-col p-4 space-y-4 scrollable">
            <!-- Drop Zone -->
            <div id="dropZone" class="border-2 border-dashed border-slate-200 rounded-xl p-4 text-center hover:border-indigo-400 cursor-pointer bg-slate-50 transition-colors relative">
                <input type="file" id="fileInput" accept=".csv, .xlsx" class="absolute inset-0 opacity-0 cursor-pointer">
                <p class="text-xs font-bold text-slate-500">Arrossega fins aquí el fitxer o penja fitxer (XLSX/CSV)</p>
            </div>

            <!-- Configuració -->
            <div class="bg-slate-900 rounded-xl p-4 text-white space-y-3 shadow-lg">
                <div class="flex gap-2">
                    <div class="flex-1">
                        <label class="text-[10px] font-bold text-slate-400 uppercase tracking-wider">Mida Ideal</label>
                        <input type="number" id="idealSize" value="4" class="w-full bg-slate-800 border-none rounded-lg p-2 text-sm focus:ring-2 focus:ring-indigo-400">
                    </div>
                    <div class="flex-1">
                        <label class="text-[10px] font-bold text-slate-400 uppercase tracking-wider">Mida Max</label>
                        <input type="number" id="maxSize" value="5" class="w-full bg-slate-800 border-none rounded-lg p-2 text-sm focus:ring-2 focus:ring-indigo-400">
                    </div>
                </div>
                <button onclick="generateGroups()" class="w-full bg-indigo-500 hover:bg-indigo-600 text-white font-bold py-2.5 rounded-lg text-sm transition-all transform active:scale-95 shadow-md">Genera / regenera grups</button>
                <button id="exportBtn" onclick="exportResults()" class="hidden w-full bg-emerald-600 hover:bg-emerald-700 text-white font-bold py-2.5 rounded-lg text-sm transition-all shadow-md">Exportar Resultats</button>
            </div>

            <!-- Manual Entry -->
            <div class="border-t border-slate-100 pt-4 space-y-2">
                <h3 class="text-[10px] font-black text-slate-400 uppercase tracking-wider">Introducció manual</h3>
                <input type="text" id="m_id" placeholder="Codi Alumne..." class="w-full border border-slate-200 rounded-lg p-2 text-sm focus:border-indigo-400 outline-none">
                <div class="flex gap-2">
                    <select id="m_part" class="flex-1 border border-slate-200 rounded-lg p-1.5 text-xs">
                        <option value="Alt">Part: Alt</option>
                        <option value="Mitjà" selected>Part: Mitjà</option>
                        <option value="Baix">Part: Baix</option>
                    </select>
                    <select id="m_comp" class="flex-1 border border-slate-200 rounded-lg p-1.5 text-xs">
                        <option value="Altes">Comp: Altes</option>
                        <option value="Mitjanes" selected>Comp: Mitjanes</option>
                        <option value="Baixes">Comp: Baixes</option>
                    </select>
                </div>
                <label class="flex items-center gap-2 text-xs font-bold text-slate-600 cursor-pointer">
                    <input type="checkbox" id="m_abs" class="rounded text-indigo-500"> Absentista
                </label>
                <button onclick="addManualStudent()" class="w-full bg-slate-100 hover:bg-slate-200 text-slate-700 font-bold py-2 rounded-lg text-xs transition-colors">Afegir a la llista</button>
            </div>

            <div id="counter" class="text-[10px] font-bold text-slate-400 text-center uppercase mt-auto pb-2">0 Alumnes totals</div>
        </aside>

        <!-- Workspace -->
        <main class="p-6 scrollable bg-slate-50 relative">
            <div id="groupsGrid" class="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-3 gap-6">
                <!-- Els grups es generen aquí -->
            </div>
            
            <div id="emptyState" class="absolute inset-0 flex flex-col items-center justify-center text-slate-400 pointer-events-none">
                <svg class="w-16 h-16 mb-4 opacity-20" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4.354a4 4 0 110 5.292M15 21H3v-1a6 6 0 0112 0v1zm0 0h6v-1a6 6 0 00-9-5.197M13 7a4 4 0 11-8 0 4 4 0 018 0z"></path></svg>
                <p class="font-medium">Carrega un fitxer per començar</p>
            </div>
        </main>
    </div>
</div>

<script>
    let students = [];
    let currentGroups = [];
    let history = [];

    const valMap = { "Alt": 3, "Altes": 3, "Mitjà": 2, "Mitjanes": 2, "Baix": 1, "Baixes": 1, "Si": true, "No": false, "SÍ": true, "SI": true, "NO": false };

    // --- IMPORTACIÓ ---
    document.getElementById('fileInput').addEventListener('change', e => {
        const file = e.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = (evt) => {
            const wb = XLSX.read(evt.target.result, { type: 'array' });
            const data = XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]]);
            processImport(data);
        };
        reader.readAsArrayBuffer(file);
    });

    function processImport(data) {
        students = [];
        let initialGrouping = {};

        data.forEach(row => {
            const s = {
                id: String(row.Codi_Alumne || row['codi alumne'] || row['Codi Alumne'] || "N/A"),
                participation: valMap[row.Participacio] || 2,
                competence: valMap[row.Competencies] || 2,
                incompatible: row.Incompatible ? String(row.Incompatible).split(/[,;]/).map(x => x.trim()).filter(x => x) : [],
                absentee: valMap[row.Absentista] === true || String(row.Absentista).toLowerCase() === 'si' || String(row.Absentista).toLowerCase() === 'sí',
                preferences: row.Preferencies ? String(row.Preferencies).split(/[,;]/).map(x => x.trim()).filter(x => x) : []
            };
            students.push(s);

            let gName = row.Grup || row.Equip;
            if (gName !== undefined && gName !== null && gName !== "") {
                if (!initialGrouping[gName]) initialGrouping[gName] = [];
                initialGrouping[gName].push(s);
            }
        });

        document.getElementById('emptyState').style.display = 'none';

        if (Object.keys(initialGrouping).length > 0) {
            currentGroups = Object.values(initialGrouping);
            saveHistory();
            renderGroups();
        } else {
            generateGroups();
        }
        updateStats();
    }

    // --- LÒGICA D'AGRUPAMENTS ---
    function generateGroups() {
        if (students.length === 0) return;
        
        const ideal = parseInt(document.getElementById('idealSize').value) || 4;
        const maxSize = parseInt(document.getElementById('maxSize').value) || 5;

        // Càlcul de nombre de grups per complir estrictament les regles de mida
        // Busquem un nombre de grups N tal que students.length / N estigui entre ideal i max si és possible, 
        // prioritzant que la mida s'acosti a l'ideal i no superi el max.
        let numGroups = Math.floor(students.length / ideal);
        if (numGroups === 0) numGroups = 1;

        // Si dividint per numGroups superem el MAX, hem d'augmentar el nombre de grups
        while (students.length / numGroups > maxSize) {
            numGroups++;
        }
        
        // Si dividint per numGroups queda massa gent sola (mides d'1 o 2 quan l'ideal és 4)
        // intentem reduir grups sempre que no passem del MAX
        while (numGroups > 1 && (students.length / (numGroups - 1)) <= maxSize && (students.length / numGroups) < (ideal - 1)) {
            numGroups--;
        }
        
        let groups = Array.from({length: numGroups}, () => []);
        
        // Barreja aleatòria per a regeneració
        let pool = [...students].sort(() => Math.random() - 0.5);
        
        // Ordenar per dificultat (absentistes i múltiples incompatibilitats primer)
        pool.sort((a,b) => {
            if (a.absentee !== b.absentee) return b.absentee ? -1 : 1;
            return b.incompatible.length - a.incompatible.length;
        });

        pool.forEach(student => {
            let bestG = -1;
            let minScore = Infinity;

            for(let i=0; i<groups.length; i++) {
                // Forçar límit de mida màxima
                if(groups[i].length >= maxSize) continue;
                
                let score = 0;
                
                // 1. Incompatibilitats (Màxima Prioritat)
                // Comprovem si el nou estudiant és incompatible amb algú del grup O si algú del grup és incompatible amb ell
                const hasIncompatible = groups[i].some(m => 
                    student.incompatible.includes(m.id) || m.incompatible.includes(student.id)
                );
                if (hasIncompatible) score += 10000;

                // 2. Heterogeneïtat i Equitat
                const absCount = groups[i].filter(m => m.absentee).length;
                score += absCount * 200; // Penalitzem posar massa absentistes junts
                
                const avgComp = groups[i].length ? (groups[i].reduce((acc, m) => acc + m.competence, 0) / groups[i].length) : 2;
                const avgPart = groups[i].length ? (groups[i].reduce((acc, m) => acc + m.participation, 0) / groups[i].length) : 2;
                
                // Volem que la mitjana del grup no s'allunyi massa del perfil de l'alumne per mantenir equilibri
                score += Math.abs(avgComp - student.competence) * 20;
                score += Math.abs(avgPart - student.participation) * 20;

                // 3. Preferències
                const hasPreference = groups[i].some(m => student.preferences.includes(m.id));
                if (hasPreference) score -= 50;

                // Mantenir el volum de grups equilibrat (que no n'hi hagi un de 5 i un de 2)
                score += groups[i].length * 100;

                if(score < minScore) {
                    minScore = score;
                    bestG = i;
                }
            }

            if(bestG === -1) {
                // Si per mides màximes no hem trobat lloc (rar), busquem el més buit
                bestG = groups.indexOf(groups.reduce((a, b) => a.length < b.length ? a : b));
            }
            groups[bestG].push(student);
        });

        currentGroups = groups.filter(g => g.length > 0);
        saveHistory();
        renderGroups();
    }

    function renderGroups() {
        const grid = document.getElementById('groupsGrid');
        grid.innerHTML = '';
        document.getElementById('exportBtn').classList.remove('hidden');
        document.getElementById('emptyState').style.display = currentGroups.length ? 'none' : 'flex';

        currentGroups.forEach((group, idx) => {
            const div = document.createElement('div');
            div.className = `group-container bg-white rounded-2xl shadow-sm border-2 border-slate-200 p-4 flex flex-col`;
            div.innerHTML = `
                <div class="flex justify-between items-center mb-4 border-b border-slate-50 pb-2">
                    <h4 class="text-xs font-black text-slate-400 uppercase tracking-widest">Grup ${idx+1}</h4>
                    <span class="text-[10px] font-bold bg-slate-100 text-slate-500 px-2 py-0.5 rounded-full">${group.length} membres</span>
                </div>
            `;
            
            div.ondragover = e => { e.preventDefault(); div.classList.add('drop-target'); };
            div.ondragleave = () => div.classList.remove('drop-target');
            div.ondrop = e => handleDrop(e, idx);

            const listDiv = document.createElement('div');
            listDiv.className = "space-y-2 flex-1";

            group.forEach(s => {
                // Comprovació exhaustiva d'incompatibilitats en el grup actual
                const hasConflict = group.some(m => 
                    m.id !== s.id && (s.incompatible.includes(m.id) || m.incompatible.includes(s.id))
                );

                const card = document.createElement('div');
                card.draggable = true;
                card.className = `p-3 rounded-xl text-sm font-semibold border transition-all cursor-grab active:cursor-grabbing flex justify-between items-center ${hasConflict ? 'warning-card' : 'bg-white border-slate-100 shadow-sm hover:shadow-md hover:border-indigo-200'}`;
                
                card.innerHTML = `
                    <div class="flex items-center gap-2">
                        <div class="w-2.5 h-2.5 rounded-full ${s.absentee ? 'bg-orange-500' : 'bg-emerald-400'}" title="${s.absentee ? 'Absentista' : 'Assistent'}"></div>
                        <span class="text-slate-700 font-bold">${s.id}</span>
                    </div>
                    <div class="flex gap-1 items-center">
                        ${s.absentee ? '<span class="text-[8px] bg-orange-100 text-orange-700 px-1.5 py-0.5 rounded font-black">ABS</span>' : ''}
                        ${hasConflict ? '<span title="Incompatibilitat detectada" class="text-red-600 font-bold">⚠️</span>' : ''}
                    </div>
                `;
                
                card.ondragstart = e => {
                    e.dataTransfer.setData('sId', s.id);
                    e.dataTransfer.setData('fromG', idx);
                };
                listDiv.appendChild(card);
            });
            
            div.appendChild(listDiv);
            grid.appendChild(div);
        });
    }

    function handleDrop(e, toG) {
        e.preventDefault();
        const sId = e.dataTransfer.getData('sId');
        const fromG = parseInt(e.dataTransfer.getData('fromG'));
        if(fromG === toG) return;

        const sIdx = currentGroups[fromG].findIndex(x => x.id === sId);
        const [student] = currentGroups[fromG].splice(sIdx, 1);
        currentGroups[toG].push(student);
        
        if (currentGroups[fromG].length === 0) currentGroups.splice(fromG, 1);
        
        saveHistory();
        renderGroups();
    }

    function saveHistory() {
        history.push(JSON.stringify(currentGroups));
        document.getElementById('undoBtn').disabled = history.length <= 1;
    }

    function undo() {
        if(history.length <= 1) return;
        history.pop();
        currentGroups = JSON.parse(history[history.length-1]);
        renderGroups();
        document.getElementById('undoBtn').disabled = history.length <= 1;
    }

    function updateStats() {
        document.getElementById('counter').innerText = `${students.length} Alumnes totals`;
    }

    function resetAll() {
        students = []; currentGroups = []; history = [];
        document.getElementById('groupsGrid').innerHTML = '';
        document.getElementById('exportBtn').classList.add('hidden');
        document.getElementById('emptyState').style.display = 'flex';
        updateStats();
    }

    function addManualStudent() {
        const id = document.getElementById('m_id').value.trim();
        if(!id) return;
        
        const newStudent = {
            id,
            participation: valMap[document.getElementById('m_part').value],
            competence: valMap[document.getElementById('m_comp').value],
            incompatible: [], 
            absentee: document.getElementById('m_abs').checked, 
            preferences: []
        };
        
        students.push(newStudent);
        document.getElementById('m_id').value = '';
        document.getElementById('m_abs').checked = false;
        updateStats();
        
        if (currentGroups.length === 0) {
            currentGroups.push([newStudent]);
        } else {
            let smallest = currentGroups.reduce((a, b) => a.length < b.length ? a : b);
            smallest.push(newStudent);
        }
        
        saveHistory();
        renderGroups();
    }

    function downloadTemplate() {
        const data = [
            ["Codi_Alumne", "Participacio", "Competencies", "Incompatible", "Absentista", "Preferencies", "Grup"],
            ["AL-001", "Alt", "Altes", "AL-002, AL-005", "No", "AL-003", ""],
            ["AL-002", "Mitjà", "Mitjanes", "AL-001", "Si", "", ""],
            ["AL-003", "Baix", "Baixes", "", "No", "", ""],
            ["AL-004", "Mitjà", "Mitjanes", "", "No", "", ""],
            ["AL-005", "Alt", "Altes", "AL-001", "No", "", ""]
        ];
        const ws = XLSX.utils.aoa_to_sheet(data);
        const wb = XLSX.utils.book_new();
        XLSX.utils.book_append_sheet(wb, ws, "Alumnat");
        XLSX.writeFile(wb, "Plantilla_Agrupacions.xlsx");
    }

    function exportResults() {
        const out = [];
        currentGroups.forEach((g, i) => {
            g.forEach(s => {
                out.push({
                    "Codi_Alumne": s.id,
                    "Participacio": Object.keys(valMap).find(k => valMap[k] === s.participation && k.length > 2),
                    "Competencies": Object.keys(valMap).find(k => valMap[k] === s.competence && k.length > 5),
                    "Incompatible": s.incompatible.join(", "),
                    "Absentista": s.absentee ? "Si" : "No",
                    "Preferencies": s.preferences.join(", "),
                    "Grup": `Grup ${i+1}`
                });
            });
        });
        const ws = XLSX.utils.json_to_sheet(out);
        const wb = XLSX.utils.book_new();
        XLSX.utils.book_append_sheet(wb, ws, "Resultats");
        XLSX.writeFile(wb, "Grups_Classe_Export.xlsx");
    }
</script>
</body>
</html>
