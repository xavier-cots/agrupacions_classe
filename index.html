<!DOCTYPE html>
<html lang="ca">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Generador de Grups de Classe</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Llibreria per llegir Excel -->
    <script src="https://cdn.sheetjs.com/xlsx-latest/package/dist/xlsx.full.min.js"></script>
    <style>
        .dragging { opacity: 0.5; transform: scale(0.95); }
        .drop-target { border: 2px dashed #f59e0b !important; background-color: #fffbeb !important; }
        
        /* Dashboard Layout */
        @media (min-width: 1024px) {
            body { overflow: hidden; height: 100vh; }
            #app { height: 100vh; display: flex; flex-direction: column; }
            .dashboard-container { flex: 1; overflow: hidden; }
            .scrollable-panel { overflow-y: auto; height: 100%; padding-bottom: 2rem; }
        }

        .scrollable-panel::-webkit-scrollbar { width: 6px; }
        .scrollable-panel::-webkit-scrollbar-track { background: transparent; }
        .scrollable-panel::-webkit-scrollbar-thumb { background: #e2e8f0; border-radius: 10px; }
        .scrollable-panel::-webkit-scrollbar-thumb:hover { background: #cbd5e1; }

        /* Classes per al Modal */
        .modal-active { opacity: 1 !important; pointer-events: auto !important; }
        .modal-content-active { transform: scale(1) !important; }
    </style>
</head>
<body class="bg-slate-50 text-slate-800 font-sans">

<div id="app" class="max-w-[1600px] mx-auto w-full px-4 md:px-6">
    <!-- Capçalera -->
    <header class="py-4 flex flex-col md:flex-row justify-between items-center border-b border-slate-200 mb-4 bg-slate-50 sticky top-0 z-10">
        <div class="text-center md:text-left">
            <h1 class="text-2xl font-bold text-indigo-700">Agrupacions de Classe</h1>
            <p class="text-xs text-slate-500 font-medium uppercase tracking-wider">Gestió intel·ligent d'equips</p>
        </div>
        <div class="flex items-center gap-3 mt-4 md:mt-0">
            <button onclick="downloadTemplate()" class="text-[11px] font-bold text-indigo-600 hover:bg-indigo-50 border border-indigo-200 px-3 py-1.5 rounded-lg transition-colors flex items-center gap-1">
                <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"></path></svg>
                Plantilla Model
            </button>
            <button onclick="showResetConfirm()" class="text-[11px] font-bold text-amber-600 hover:bg-amber-50 border border-amber-200 px-3 py-1.5 rounded-lg transition-colors flex items-center gap-1">
                <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"></path></svg>
                Reiniciar
            </button>
        </div>
    </header>

    <div class="dashboard-container grid grid-cols-1 lg:grid-cols-12 gap-6 h-full pb-6">
        
        <!-- Columna Esquerra -->
        <div class="lg:col-span-3 scrollable-panel space-y-5">
            <section class="bg-white p-5 rounded-2xl shadow-sm border border-slate-200">
                <h2 class="text-sm font-bold text-slate-400 uppercase tracking-widest mb-4 flex items-center gap-2">
                    <span class="w-5 h-5 bg-indigo-600 text-white rounded-full flex items-center justify-center text-[10px]">1</span>
                    Importar dades
                </h2>
                <div class="border-2 border-dashed border-slate-200 rounded-xl p-6 text-center hover:border-indigo-400 transition-colors cursor-pointer relative group">
                    <input type="file" id="fileInput" accept=".csv, .xlsx, .xls" class="absolute inset-0 opacity-0 cursor-pointer">
                    <div class="text-indigo-500 group-hover:scale-110 transition-transform mb-2 flex justify-center">
                        <svg class="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 13h6m-3-3v6m5 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"></path></svg>
                    </div>
                    <p class="text-xs font-bold text-slate-700">Puja CSV o Excel</p>
                </div>
            </section>

            <section class="bg-white p-5 rounded-2xl shadow-sm border border-slate-200">
                <h2 class="text-sm font-bold text-slate-400 uppercase tracking-widest mb-4 flex items-center gap-2">
                    <span class="w-5 h-5 bg-indigo-600 text-white rounded-full flex items-center justify-center text-[10px]">+</span>
                    Nou Alumne
                </h2>
                <div class="space-y-3">
                    <input type="text" id="manualId" placeholder="Nom de l'alumne..." class="w-full px-3 py-2 text-sm border border-slate-200 rounded-lg focus:ring-2 focus:ring-indigo-500 outline-none transition-all">
                    <div class="grid grid-cols-2 gap-2">
                        <select id="manualPart" class="px-2 py-2 text-xs border border-slate-200 rounded-lg outline-none bg-slate-50">
                            <option value="Mitjà">Part. Mitjana</option>
                            <option value="Alt">Part. Alta</option>
                            <option value="Baix">Part. Baixa</option>
                        </select>
                        <select id="manualComp" class="px-2 py-2 text-xs border border-slate-200 rounded-lg outline-none bg-slate-50">
                            <option value="Mitjanes">Comp. Mitjanes</option>
                            <option value="Altes">Comp. Altes</option>
                            <option value="Baixes">Comp. Baixes</option>
                        </select>
                    </div>
                    <label class="flex items-center gap-2 text-[11px] text-slate-600 bg-slate-50 p-2 rounded-lg cursor-pointer">
                        <input type="checkbox" id="manualAbs" class="rounded text-indigo-600"> Absentisme habitual
                    </label>
                    <button onclick="addManualStudent()" class="w-full bg-slate-800 hover:bg-black text-white text-[11px] font-bold py-2.5 rounded-lg transition-colors uppercase tracking-widest">
                        Afegir a la llista
                    </button>
                </div>
            </section>

            <section class="bg-indigo-700 p-5 rounded-2xl shadow-lg shadow-indigo-200 text-white">
                <h2 class="text-sm font-bold text-indigo-200 uppercase tracking-widest mb-4 flex items-center gap-2">
                    <span class="w-5 h-5 bg-white text-indigo-700 rounded-full flex items-center justify-center text-[10px]">2</span>
                    Grupatge
                </h2>
                <div class="space-y-4">
                    <div class="grid grid-cols-2 gap-3">
                        <div>
                            <label class="block text-[10px] font-bold text-indigo-200 mb-1 uppercase tracking-tight">Mida Ideal</label>
                            <input type="number" id="preferredSize" value="4" min="1" class="w-full px-3 py-2 bg-indigo-800 border border-indigo-500 rounded-lg focus:ring-2 focus:ring-white outline-none text-sm font-bold">
                        </div>
                        <div>
                            <label class="block text-[10px] font-bold text-indigo-200 mb-1 uppercase tracking-tight">Mida Màx.</label>
                            <input type="number" id="maxSize" value="5" min="1" class="w-full px-3 py-2 bg-indigo-800 border border-indigo-500 rounded-lg focus:ring-2 focus:ring-white outline-none text-sm font-bold">
                        </div>
                    </div>
                    <button onclick="generateGroups()" class="w-full bg-white hover:bg-indigo-50 text-indigo-700 font-bold py-3 rounded-xl transition-all shadow-md active:scale-95">
                        Generar Agrupacions
                    </button>
                    <button id="exportBtn" onclick="exportToCSV()" class="hidden w-full bg-emerald-500 hover:bg-emerald-600 text-white font-bold py-3 rounded-xl transition-all shadow-md">
                        Exportar a CSV
                    </button>
                </div>
            </section>
        </div>

        <!-- Columna Dreta -->
        <div class="lg:col-span-9 scrollable-panel">
            <div id="emptyState" class="h-full flex flex-col items-center justify-center bg-white rounded-3xl border-2 border-dashed border-slate-200 p-10 text-center">
                <div class="w-20 h-20 bg-slate-50 rounded-full flex items-center justify-center mb-4 text-slate-300">
                    <svg class="w-10 h-10" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.656-.126-1.283-.356-1.857M7 20H2v-2a3 3 0 005.356-1.857M7 20v-2c0-.656.126-1.283.356-1.857m0 0a5.002 5.002 0 019.288 0M15 7a3 3 0 11-6 0 3 3 0 016 0zm6 3a2 2 0 11-4 0 2 2 0 014 0zM7 10a2 2 0 11-4 0 2 2 0 014 0z"></path></svg>
                </div>
                <h3 class="text-xl font-bold text-slate-400">Encara no hi ha grups</h3>
                <p id="counterLabel" class="text-xs text-indigo-500 mt-4 font-bold"></p>
            </div>

            <div id="resultsArea" class="hidden">
                <div class="flex justify-between items-end mb-6">
                    <h2 class="text-3xl font-black text-slate-800 tracking-tight">Panell de Grups</h2>
                    <span id="statsLabel" class="text-[11px] font-bold bg-white border border-slate-200 px-4 py-1.5 rounded-full text-slate-500 shadow-sm"></span>
                </div>
                <div id="groupsGrid" class="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-3 gap-5"></div>
            </div>
        </div>
    </div>
</div>

<!-- Modal de Confirmació -->
<div id="customModal" class="fixed inset-0 bg-slate-900/40 backdrop-blur-sm z-50 flex items-center justify-center opacity-0 pointer-events-none transition-all duration-300">
    <div class="bg-white rounded-3xl p-8 max-w-sm w-full shadow-2xl transform scale-95 transition-all duration-300">
        <div class="w-16 h-16 rounded-2xl flex items-center justify-center mb-6 mx-auto bg-amber-50 text-amber-500">
            <svg class="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"></path></svg>
        </div>
        <h3 class="text-xl font-bold text-slate-800 text-center mb-2">Reiniciar dades?</h3>
        <p class="text-slate-500 text-center text-sm mb-8 leading-relaxed">Es borraran tots els alumnes carregats i les agrupacions actuals.</p>
        <div class="flex gap-3">
            <button id="cancelBtn" class="flex-1 px-4 py-3 rounded-xl border border-slate-200 text-slate-500 font-bold text-sm hover:bg-slate-50 transition-colors">Cancel·lar</button>
            <button id="confirmResetBtn" class="flex-1 px-4 py-3 rounded-xl bg-amber-500 hover:bg-amber-600 text-white font-bold text-sm shadow-lg shadow-amber-200 transition-all">Sí, esborrar</button>
        </div>
    </div>
</div>

<script>
    let students = [];
    let currentGroups = [];
    const mapping = { "Alt": 3, "Altes": 3, "Mitjà": 2, "Mitjanes": 2, "Baix": 1, "Baixes": 1, "Si": true, "No": false, "SÍ": true, "SI": true };

    // --- FITXERS ---
    document.getElementById('fileInput').addEventListener('change', function(e) {
        const file = e.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        const extension = file.name.split('.').pop().toLowerCase();
        reader.onload = function(e) {
            if (extension === 'csv') processCSV(e.target.result);
            else processExcel(e.target.result);
        };
        if (extension === 'csv') reader.readAsText(file);
        else reader.readAsArrayBuffer(file);
    });

    function processExcel(buffer) {
        const workbook = XLSX.read(buffer, { type: 'array' });
        const sheetName = workbook.SheetNames[0];
        const csv = XLSX.utils.sheet_to_csv(workbook.Sheets[sheetName]);
        processCSV(csv);
    }

    function processCSV(text) {
        students = [];
        const lines = text.split(/\r?\n/);
        for (let i = 1; i < lines.length; i++) {
            let line = lines[i].trim();
            if (!line) continue;
            const separator = line.includes(';') ? ';' : ',';
            const cols = line.match(/(".*?"|[^,;]+|(?<=[,;])(?=[,;])|(?<=[,;])$)/g) || [];
            const cleanCols = cols.map(c => c.trim().replace(/^"|"$/g, ''));
            students.push(createStudentObject(cleanCols[0], cleanCols[1], cleanCols[2], cleanCols[3], cleanCols[4], cleanCols[5], cleanCols[6] ? parseInt(cleanCols[6]) : null));
        }
        updateInterface();
        generateGroups();
    }

    function createStudentObject(id, part, comp, incomp, abs, pref, group) {
        return {
            id: id || "Sense Nom",
            participation: mapping[part] || 2,
            competence: mapping[comp] || 2,
            incompatible: incomp ? String(incomp).split(/[-|/]/).map(x => x.trim()) : [],
            absentee: mapping[abs] || false,
            preferences: pref ? String(pref).split(/[-|/]/).map(x => x.trim()) : [],
            assignedGroup: group
        };
    }

    function updateInterface() {
        document.getElementById('counterLabel').innerText = students.length > 0 ? `${students.length} alumnes carregats` : "";
    }

    // --- GRUPS ---
    function generateGroups() {
        if (students.length === 0) return;
        const preferred = parseInt(document.getElementById('preferredSize').value);
        const max = parseInt(document.getElementById('maxSize').value);
        let numGroups = Math.max(1, Math.ceil(students.length / preferred));
        let groups = Array.from({ length: numGroups }, () => []);
        let sorted = [...students].sort((a, b) => (b.competence + b.participation) - (a.competence + a.participation));

        sorted.forEach(student => {
            let scores = groups.map((g, i) => {
                let score = 0;
                if (g.some(m => student.incompatible.includes(m.id) || m.incompatible.includes(student.id))) score -= 1000;
                if (g.length < preferred) score += 100;
                else if (g.length < max) score += 10;
                else score -= 500;
                if (g.some(m => student.preferences.includes(m.id))) score += 40;
                if (student.absentee) score -= (g.filter(m => m.absentee).length * 15);
                return { index: i, score: score - (g.length * 5) };
            });
            scores.sort((a, b) => b.score - a.score);
            groups[scores[0].index].push(student);
        });
        currentGroups = groups;
        renderGroups();
    }

    function renderGroups() {
        document.getElementById('emptyState').classList.add('hidden');
        document.getElementById('resultsArea').classList.remove('hidden');
        document.getElementById('exportBtn').classList.remove('hidden');
        const grid = document.getElementById('groupsGrid');
        grid.innerHTML = '';
        
        currentGroups.forEach((group, gIndex) => {
            const container = document.createElement('div');
            container.className = 'bg-white border border-slate-200 rounded-3xl overflow-hidden shadow-sm hover:shadow-md transition-shadow group/card';
            container.addEventListener('dragover', e => { e.preventDefault(); container.classList.add('drop-target'); });
            container.addEventListener('dragleave', () => container.classList.remove('drop-target'));
            container.addEventListener('drop', e => {
                e.preventDefault();
                container.classList.remove('drop-target');
                moveStudent(e.dataTransfer.getData('text/plain'), parseInt(e.dataTransfer.getData('fromGroup')), gIndex);
            });

            let html = `<div class="bg-indigo-50/50 px-5 py-3 border-b border-indigo-100 flex justify-between items-center"><span class="font-black text-indigo-700 uppercase text-[10px]">Equip ${gIndex + 1}</span><span class="text-[10px] bg-white text-indigo-400 px-2 py-0.5 rounded-full font-bold">${group.length} Pers.</span></div><div class="p-4 space-y-2 min-h-[60px]">`;
            group.forEach(student => {
                const hasConflict = group.some(other => student.incompatible.includes(other.id) || other.incompatible.includes(student.id));
                html += `<div draggable="true" ondragstart="onDragStart(event, '${student.id}', ${gIndex})" ondragend="onDragEnd(event)" class="px-4 py-3 rounded-2xl border cursor-move transition-all ${hasConflict ? 'border-amber-200 bg-amber-50 text-amber-700' : 'border-slate-100 bg-slate-50'} flex justify-between items-center text-xs font-bold"><span>${student.id}</span>${hasConflict ? '<span>⚠️</span>' : ''}</div>`;
            });
            container.innerHTML = html + `</div>`;
            grid.appendChild(container);
        });
        document.getElementById('statsLabel').innerText = `${currentGroups.length} Equips • Mitjana: ${(students.length / currentGroups.length).toFixed(1)}`;
    }

    function onDragStart(e, id, idx) { e.dataTransfer.setData('text/plain', id); e.dataTransfer.setData('fromGroup', idx); e.target.classList.add('dragging'); }
    function onDragEnd(e) { e.target.classList.remove('dragging'); }
    function moveStudent(id, from, to) {
        if (from === to) return;
        const sIdx = currentGroups[from].findIndex(s => s.id === id);
        if (sIdx > -1) {
            const [student] = currentGroups[from].splice(sIdx, 1);
            currentGroups[to].push(student);
            renderGroups();
        }
    }

    function addManualStudent() {
        const id = document.getElementById('manualId').value.trim();
        if (!id) return;
        const student = createStudentObject(id, document.getElementById('manualPart').value, document.getElementById('manualComp').value, "", document.getElementById('manualAbs').checked ? "Si" : "No", "", null);
        students.push(student);
        document.getElementById('manualId').value = "";
        updateInterface();
        if (currentGroups.length > 0) {
            currentGroups.reduce((a, b) => a.length <= b.length ? a : b).push(student);
            renderGroups();
        } else generateGroups();
    }

    // --- MODAL FIX ---
    function showResetConfirm() {
        const modal = document.getElementById('customModal');
        modal.classList.add('modal-active');
        modal.firstElementChild.classList.add('modal-content-active');
    }

    function closeModal() {
        const modal = document.getElementById('customModal');
        modal.classList.remove('modal-active');
        modal.firstElementChild.classList.remove('modal-content-active');
    }

    document.getElementById('cancelBtn').onclick = closeModal;
    document.getElementById('confirmResetBtn').onclick = () => {
        students = [];
        currentGroups = [];
        document.getElementById('resultsArea').classList.add('hidden');
        document.getElementById('emptyState').classList.remove('hidden');
        document.getElementById('exportBtn').classList.add('hidden');
        document.getElementById('fileInput').value = "";
        updateInterface();
        closeModal();
    };

    function downloadTemplate() {
        const csv = "Codi_Alumne,Participacio,Competencies,Incompatible,Absentista,Preferencies\nMarc B.,Alt,Altes,,No,\nAnna G.,Mitjà,Mitjanes,,No,";
        const blob = new Blob([csv], { type: 'text/csv' });
        const a = document.createElement("a");
        a.href = URL.createObjectURL(blob);
        a.download = "plantilla_alumnes.csv";
        a.click();
    }

    function exportToCSV() {
        let csv = "Codi_Alumne,Participacio,Competencies,Incompatible,Absentista,Preferencies,Grup\n";
        currentGroups.forEach((g, i) => g.forEach(s => {
            csv += `"${s.id}","${getLabel(s.participation)}","${getLabel(s.competence)}","${s.incompatible.join('-')}","${s.absentee?'Si':'No'}","${s.preferences.join('-')}","${i+1}"\n`;
        }));
        const blob = new Blob([csv], { type: 'text/csv' });
        const a = document.createElement("a");
        a.href = URL.createObjectURL(blob);
        a.download = "agrupacions.csv";
        a.click();
    }
    function getLabel(v) { return v === 3 ? "Alt" : v === 2 ? "Mitjà" : "Baix"; }
</script>
</body>
</html>
